version: '3.9'

services:
  registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
    container_name: zenvy-registry
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/zenvy
      - JWT_SECRET=${JWT_SECRET:-zenvy_secret_wyatt_mouris_change_in_production}
      - NODE_ENV=production
    volumes:
      - zenvy_tarballs:/app/tarballs
    depends_on:
      - mongo
    networks:
      - zenvy-net

  mongo:
    image: mongo:7
    container_name: zenvy-mongo
    restart: unless-stopped
    volumes:
      - zenvy_db:/data/db
    networks:
      - zenvy-net

  nginx:
    image: nginx:alpine
    container_name: zenvy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - zenvy_certs:/etc/ssl/zenvy
    depends_on:
      - registry
    networks:
      - zenvy-net

volumes:
  zenvy_db:
  zenvy_tarballs:
  zenvy_certs:

networks:
  zenvy-net:
    driver: bridge
